name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Build the catalog. Falls back to placeholder data automatically if no
      # TMDB secret is configured, so the site still deploys.
      - name: Build data.json
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TMDB_READ_TOKEN: ${{ secrets.TMDB_READ_TOKEN }}
        run: npm run build:data

      - name: Build site
        env:
          # Defaults to the project-site path for this repo. Override with a
          # repo variable BASE_PATH (e.g. '/' for a user/org or custom-domain site).
          BASE_PATH: ${{ vars.BASE_PATH || '/marvel_tracker/' }}
          # Cloud sync (optional). These are public values — set them as repo
          # *variables* (Settings → Secrets and variables → Actions → Variables).
          # Empty = app runs local-only.
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
